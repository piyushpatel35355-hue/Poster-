<!DOCTYPE html>
<html>
<a id="download" style="display:none;"></a>
<head>
  <title>Hanuman Poster Generator</title>
</head>
<body style="text-align:center; font-family:sans-serif; background:#fff3e0;">

  <h2> Apna Hanuman Jayanti Poster Banaye</h2>

  <input type="text" id="name" placeholder="Apna Naam Likho"><br><br>
  <input type="file" id="photo"><br><br>

  <button onclick="generate()">Poster Banao</button>

  <br><br>
  <canvas id="canvas" width="400" height="600"></canvas><br><br>

  <a id="download" style="display:none; font-size:18px; color:red;">Download Poster</a>

<script>
function generate() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("photo").files[0];

  if (!name || !file) {
    alert("Naam aur Photo dono daalo!");
    return;
  }

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  const bg = new Image();
  bg.src = "https://i.imgur.com/m4wZmra.png";

  bg.onload = function() {
    ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

    const reader = new FileReader();
    reader.onload = function(e) {
      const userImg = new Image();
      userImg.src = e.target.result;

      userImg.onload = function() {
        //  PHOTO POSITION (adjusted for your design)
        ctx.drawImage(userImg, 130, 360, 140, 140);

        //  NAME STYLE
        ctx.font = "bold 22px Arial";
        ctx.fillStyle = "#000";
        ctx.textAlign = "center";

        //  NAME POSITION
        ctx.fillText(name, 200, 530);

        const link = document.getElementById("download");
        link.href = canvas.toDataURL();
        link.download = "hanuman_poster.png";
   link.style.display = "inline-block";
link.innerText = "⬇️ Download Poster";
link.style.padding = "10px";
link.style.background = "red";
link.style.color = "white";
link.style.textDecoration = "none";
      }
    }
    reader.readAsDataURL(file);
  }
}
</script>

</body>
</html>
